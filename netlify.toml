[build]
  command = "cd artifacts/mockup-sandbox && rm -rf node_modules package-lock.json pnpm-lock.yaml && npm install --no-package-lock && npm run build"
  publish = "artifacts/mockup-sandbox/dist"

[build.environment]
  NODE_VERSION = "22"
  NPM_VERSION = "10"
  NODE_OPTIONS = "--max-old-space-size=4096"